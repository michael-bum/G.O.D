name: Docker Images

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: Build every configured image regardless of changed files
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "23 3 * * 0"

permissions:
  contents: read

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changed-images.outputs.has_changes }}
      matrix: ${{ steps.changed-images.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed image scopes
        id: changed-images
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_ALL: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_all) }}
        run: |
          set -euo pipefail

          if [[ "${FORCE_ALL}" == "true" ]]; then
            : > changed-files.txt
          elif [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" > changed-files.txt
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}" > changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r "${HEAD_SHA}" > changed-files.txt
          fi

          python <<'PY'
          import fnmatch
          import json
          import os
          from pathlib import Path

          force_all = os.environ["FORCE_ALL"] == "true"
          changed_files = [
              line.strip()
              for line in Path("changed-files.txt").read_text().splitlines()
              if line.strip()
          ]

          images = [
              {
                  "id": "text-evaluator",
                  "image": "gradientsio/text-evaluator",
                  "channel_tag": "basilica",
                  "dockerfile": "dockerfiles/validator.dockerfile",
                  "patterns": [
                      "validator/evaluation/**",
                      "dockerfiles/validator.dockerfile",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "image-evaluator",
                  "image": "gradientsio/image-evaluator",
                  "channel_tag": "basilica",
                  "dockerfile": "dockerfiles/validator-diffusion.dockerfile",
                  "patterns": [
                      "validator/evaluation/**",
                      "dockerfiles/validator-diffusion.dockerfile",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "env-evaluator",
                  "image": "gradientsio/env-evaluator",
                  "channel_tag": "basilica",
                  "dockerfile": "dockerfiles/validator-env.dockerfile",
                  "patterns": [
                      "validator/evaluation/**",
                      "dockerfiles/validator-env.dockerfile",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "env-eval-intercode",
                  "image": "gradientsio/env-eval-intercode",
                  "channel_tag": "basilica",
                  "dockerfile": "dockerfiles/validator-intercode.dockerfile",
                  "patterns": [
                      "validator/evaluation/**",
                      "dockerfiles/validator-intercode.dockerfile",
                      "dockerfiles/intercode_build_fs.sh",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "pvp-evaluator",
                  "image": "gradientsio/pvp-evaluator",
                  "channel_tag": "basilica",
                  "dockerfile": "dockerfiles/pvp-eval.dockerfile",
                  "patterns": [
                      "validator/evaluation/**",
                      "dockerfiles/pvp-eval.dockerfile",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "trainer-downloader",
                  "image": "gradientsio/trainer-downloader",
                  "channel_tag": "latest",
                  "dockerfile": "dockerfiles/trainer-downloader.dockerfile",
                  "patterns": [
                      "dockerfiles/trainer-downloader.dockerfile",
                      "trainer/**",
                      "core/**",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "trainer-uploader",
                  "image": "gradientsio/trainer-uploader",
                  "channel_tag": "latest",
                  "dockerfile": "dockerfiles/hf-uploader.dockerfile",
                  "patterns": [
                      "dockerfiles/hf-uploader.dockerfile",
                      "trainer/**",
                      "core/**",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "trainer-cacher-cleaner",
                  "image": "gradientsio/trainer-cacher-cleaner",
                  "channel_tag": "latest",
                  "dockerfile": "dockerfiles/cache-cleanup.dockerfile",
                  "patterns": [
                      "dockerfiles/cache-cleanup.dockerfile",
                      "trainer/**",
                      ".dockerignore",
                  ],
              },
              {
                  "id": "model-prep",
                  "image": "gradientsio/model-prep",
                  "channel_tag": "latest",
                  "dockerfile": "dockerfiles/model-prep.dockerfile",
                  "patterns": [
                      "dockerfiles/model-prep.dockerfile",
                      "trainer/model_prep/**",
                      "core/**",
                      ".dockerignore",
                  ],
              },
          ]

          def is_match(path: str, pattern: str) -> bool:
              if pattern.endswith("/**"):
                  prefix = pattern[:-3]
                  return path == prefix or path.startswith(f"{prefix}/")
              return fnmatch.fnmatch(path, pattern)

          selected = []
          for image in images:
              if force_all or any(
                  is_match(path, pattern)
                  for path in changed_files
                  for pattern in image["patterns"]
              ):
                  selected.append({
                      key: value
                      for key, value in image.items()
                      if key != "patterns"
                  })

          matrix = {"include": selected}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"has_changes={str(bool(selected)).lower()}\n")
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")

          if force_all:
              print("Force-all mode selected every configured image.")
          else:
              print("Changed files:")
              for path in changed_files:
                  print(f"  {path}")

          print("Selected images:")
          for image in selected:
              print(f"  {image['id']}: {image['image']}:{image['channel_tag']}")
          PY

  build:
    name: Build ${{ matrix.id }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    env:
      PUSH_IMAGE: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: |
            ${{ matrix.image }}:${{ matrix.channel_tag }}
            ${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }},ignore-error=true
